version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: sentinel-postgres
    environment:
      POSTGRES_DB: sentinelglobal
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel_secret
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sentinel']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: sentinel-rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: sentinel
      RABBITMQ_DEFAULT_PASS: sentinel_secret
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/api.Dockerfile
    container_name: sentinel-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://sentinel:sentinel_secret@postgres:5432/sentinelglobal
      REDIS_HOST: redis
      REDIS_PORT: 6379

  web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/web.Dockerfile
    container_name: sentinel-web
    ports:
      - '3000:3000'
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://api:3001/api
      NEXT_PUBLIC_WS_URL: http://api:3001

  worker:
    build:
      context: ../..
      dockerfile: infrastructure/docker/worker.Dockerfile
    container_name: sentinel-worker
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
